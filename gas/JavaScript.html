<script>
    const { jsPDF } = window.jspdf;
    
    // --- GLOBAL VARIABLES ---
    let billingSummaryData = [];
    let historyData = [];
    let clientOnboardingInfo = {}; 
    let dashboardAnalytics = null;
    let dashboardDefaults = { time: 'thisMonth', startupTab: 'dashboard', billingTab: 'ready', feeRate: '22' };
    let billingInsightsData = null;
    let billingSummaryInfo = {};
    let dataLoaded = false;
    let billedCaseIdSet = new Set();
    // A case row is "previously billed" if it was invoiced OR its posting date is before the billing window
    // 7-day grace period: on days 1-7 of the month, billing window is the previous month
    function _getBillingMonthStart() {
      const now = new Date();
      return now.getDate() <= 7
        ? new Date(now.getFullYear(), now.getMonth() - 1, 1)
        : new Date(now.getFullYear(), now.getMonth(), 1);
    }
    function _isRowBilled(caseId, postingDateStr) {
      if (billedCaseIdSet.has(String(caseId))) return true;
      if (!postingDateStr) return false;
      const d = new Date(postingDateStr);
      if (isNaN(d.getTime())) return false;
      return d < _getBillingMonthStart();
    }
    let _pendingHighlightCaseId = null;
    const _detailsCache = new Map(); // clientName → {cases, billedIds}
    let vantageCutoff = '2026-05-06';

    function getNextInvoiceNumberLocal() {
        let maxNum = 1000;
        (historyData || []).forEach(h => {
            if (h.invoiceNumber && typeof h.invoiceNumber === 'string') {
                const parts = h.invoiceNumber.split('-');
                if (parts.length > 1) {
                    const num = parseInt(parts[1]);
                    if (!isNaN(num) && num > maxNum) maxNum = num;
                }
            }
        });
        return `INV-${maxNum + 1}`;
    }

    // Charts
    let weeklyChart = null;
    let categoryChart = null;

    // Pagination & Sorting
    let billingCurrentPage = 1;
    let historyCurrentPage = 1;
    let summaryCurrentPage = 1;
    let itemsPerPage = 25;
    let historyItemsPerPage = 25;
    let summaryItemsPerPage = 25;
    let billingSortState = { key: 'clientName', direction: 'asc' };
    let currentBillingFilter = 'ready'; // ready | pending | billed | overdue | all — set by sidebar nav

    // Infinite scroll state
    const INFINITE_BATCH = 25;
    let billingRenderedCount = INFINITE_BATCH;
    let summaryRenderedCount = INFINITE_BATCH;
    let billingAllClients = [];
    let summaryAllKeys = [];
    let summaryMonthlyGroupsCache = {};

    // Billing bulk actions
    let billingSelectedClients = new Set();

    const DEFAULT_RATE = 0.22;
    
    // --- INIT ---
    document.addEventListener('DOMContentLoaded', () => { 
        console.log("App Initializing...");
        initTheme(); 
        loadInitialData(); 
        addEventListeners(); 
    });

    // --- HELPER FUNCTIONS ---
    const getClientRate = (clientName) => {
        if (!clientName) return DEFAULT_RATE;
        if (clientOnboardingInfo[clientName]) return clientOnboardingInfo[clientName].rate ?? DEFAULT_RATE;
        const match = Object.keys(clientOnboardingInfo).find(k => k.trim().toLowerCase() === clientName.trim().toLowerCase());
        return match ? (clientOnboardingInfo[match].rate ?? DEFAULT_RATE) : DEFAULT_RATE;
    };

    const parseCurrency = (val) => parseFloat(String(val).replace(/[^0-9.-]+/g,"")) || 0;
    const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
    const formatCurrencyHTML = (val) => {
        const text = formatCurrency(val);
        const parts = text.split('.');
        if (parts.length === 2) {
            return `${parts[0]}<span style="color:var(--color-text-secondary); opacity: 0.6; font-size: 0.9em; font-weight: 500;">.${parts[1]}</span>`;
        }
        return text;
    };
    const formatPercent = (val, digits = 0) => new Intl.NumberFormat('en-US', { style: 'percent', minimumFractionDigits: digits, maximumFractionDigits: digits }).format(val);

    // Counting animation — easeOutExpo, ~600ms
    function animateCounter(el, targetVal, renderFn, duration = 600) {
        if (!el) return;
        const start = performance.now();
        const startVal = parseFloat(el.dataset.counterVal || '0');
        el.dataset.counterVal = targetVal;
        if (el._counterRaf) cancelAnimationFrame(el._counterRaf);
        const tick = (now) => {
            const elapsed = now - start;
            const progress = Math.min(elapsed / duration, 1);
            // easeOutExpo
            const ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
            const current = startVal + (targetVal - startVal) * ease;
            el.innerHTML = renderFn(current);
            if (progress < 1) el._counterRaf = requestAnimationFrame(tick);
        };
        el._counterRaf = requestAnimationFrame(tick);
    }
    const setLoading = (isLoading) => {
        const el = document.getElementById('loading-indicator');
        if (el) el.classList.toggle('show', isLoading);
    };
    
    function initTheme() {
        // Preference: server default -> localStorage -> light
        const serverTheme = (dashboardDefaults && dashboardDefaults.theme) ? dashboardDefaults.theme : null;
        const savedTheme = localStorage.getItem('theme') || serverTheme || 'light';
        setTheme(savedTheme, true); // true = skip server save during init
    }

    function setTheme(theme, skipSave = false) {
        const resolved = theme === 'auto'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : theme;
        document.body.setAttribute('data-theme', resolved);
        localStorage.setItem('theme', theme);
        document.querySelectorAll('.theme-option').forEach(opt => opt.classList.toggle('active', opt.dataset.theme === theme));
        if (weeklyChart) renderWeeklyChart(dashboardAnalytics.dailyData);
        if (categoryChart) renderCategoryChart(dashboardAnalytics.categoryData);

        if (!skipSave) {
            dashboardDefaults = { ...dashboardDefaults, theme: theme };
            _savePopupDefaults();
        }
    }

    function updateThemePopup() {
        const current = localStorage.getItem('theme') || (dashboardDefaults ? dashboardDefaults.theme : 'light');
        document.querySelectorAll('.theme-popup-option[data-theme-val]').forEach(btn => {
            btn.classList.toggle('is-selected', btn.dataset.themeVal === current);
        });
        const currentTime = dashboardDefaults.time || 'thisMonth';
        document.querySelectorAll('.popup-default-time-opt').forEach(btn => {
            btn.classList.toggle('is-selected', btn.dataset.timeVal === currentTime);
        });
        const currentStartup = dashboardDefaults.startupTab || 'dashboard';
        document.querySelectorAll('.popup-default-startup-opt').forEach(btn => {
            btn.classList.toggle('is-selected', btn.dataset.startupVal === currentStartup);
        });
        if (window.addIcons) addIcons();
    }

    function _savePopupDefaults() {
        google.script.run
            .withSuccessHandler(newDefaults => { dashboardDefaults = newDefaults; })
            .withFailureHandler(() => {})
            .saveDefaultDashboardSettings(dashboardDefaults);
    }

    function _setDefaultTime(val) {
        dashboardDefaults = { ...dashboardDefaults, time: val };
        setDropdownValue('dashboard-time-filter-menu', val);
        updateThemePopup();
        _savePopupDefaults();
        // Trigger analytics reload to apply default immediately
        loadDashboardAnalytics();
    }

    function _setDefaultStartup(val) {
        dashboardDefaults = { ...dashboardDefaults, startupTab: val };
        updateThemePopup();
        _savePopupDefaults();
        // Switch view immediately to apply default
        switchView(val);
    }

    function initThemePopup() {
        const btn = document.getElementById('theme-toggle-btn');
        const popup = document.getElementById('theme-popup');
        if (!btn || !popup) return;

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = popup.classList.contains('show');
            if (isOpen) { popup.classList.remove('show'); return; }
            const rect = btn.getBoundingClientRect();
            popup.style.left = rect.left + 'px';
            popup.style.bottom = (window.innerHeight - rect.top + 6) + 'px';
            popup.style.top = 'auto';
            updateThemePopup();
            popup.classList.add('show');
        });

        document.addEventListener('click', (e) => {
            if (!popup.contains(e.target) && e.target !== btn) {
                popup.classList.remove('show');
            }
        });
    }

    // --- DATA LOADING ---
    function loadInitialData() {
        document.querySelector('.sidebar-nav').style.pointerEvents = 'none';
        document.querySelector('.sidebar-nav').style.opacity = '0.5';
        google.script.run
            .withSuccessHandler(payload => {
                onInitialDataReceived(payload);
                loadDashboardAnalytics(true);
                const nav = document.querySelector('.sidebar-nav');
                nav.style.pointerEvents = '';
                nav.style.opacity = '';
            })
            .withFailureHandler(err => {
                const nav = document.querySelector('.sidebar-nav');
                nav.style.pointerEvents = '';
                nav.style.opacity = '';
                onFailure(err);
            })
            .getInitialPayloadFast();
    }
    
    let _billingPreloaded = false;
    function _silentPreloadBilling() {
        if (_billingPreloaded) return; // only once per session
        _billingPreloaded = true;
        google.script.run
            .withSuccessHandler(data => {
                billingSummaryData = data.billingSummary;
                historyData = data.history;
                billedCaseIdSet = new Set(data.billedIds.map(String));
                billingInsightsData = data.billingInsights;
                // Re-render billing silently only if user is already on that tab
                const active = document.querySelector('.content-wrapper[style*="flex"]:not([style*="none"])');
                if (active && (active.id === 'billing-container' || active.id === 'summary-container' || active.id === 'invoices-container')) {
                    renderBillingDashboard(billingInsightsData);
                    renderMonthlyHistorySummary();
                    renderInvoiceHistoryTable();
                }
                // Stage 3: now that billing is loaded, prefetch client details in background
                setTimeout(() => _prefetchDetailsClients(null), 300);
            })
            .withFailureHandler(e => console.warn('Silent preload failed:', e))
            .getBillingAndHistoryData();
    }

    function refreshBillingAndHistory() {
        setLoading(true);
        google.script.run
            .withSuccessHandler(data => {
                billingSummaryData = data.billingSummary;
                historyData = data.history;
                billedCaseIdSet = new Set(data.billedIds.map(String));
                billingInsightsData = data.billingInsights;
                renderBillingDashboard(billingInsightsData);
                renderMonthlyHistorySummary();
                renderInvoiceHistoryTable();
                setLoading(false);
                showToast('Data refreshed successfully.', 'success');
                setTimeout(() => _prefetchDetailsClients(null), 300);
            })
            .withFailureHandler(onFailure)
            .getBillingAndHistoryData();
    }

    function onInitialDataReceived(payload) {
        console.log("Data Received");
        billingSummaryData = payload.billingSummary;
        historyData = payload.history;
        billedCaseIdSet = new Set(payload.billedIds.map(String));
        billedCaseIdSet.add('13011996'); // Hardcoded mark as billed
        // 14969195 has row-level billed amounts — handled in _isCaseBilledRow()
        
        // Manual History Injection for Case 13011996
        if (historyData && !historyData.find(h => h.invoiceNumber === 'NV-1042a')) {
            historyData.push({
                invoiceNumber: 'NV-1042a',
                clientName: 'TheSavingsMart',
                billedDate: new Date('2026-02-02T12:00:00Z').toISOString(),
                billedFee: 81.30,
                totalReimbursed: 325.20,
                caseIds: ['13011996'],
                rmsPostingDate: new Date('2026-01-23T12:00:00Z').toISOString()
            });
        }

        clientOnboardingInfo = payload.onboardingInfo;
        billingInsightsData = payload.billingInsights;
        billingSummaryInfo = payload.billingSummaryInfo || {};
        if (payload.vantageCutoff) {
            vantageCutoff = payload.vantageCutoff;
            const inp = document.getElementById('vantage-cutoff-input');
            if (inp) inp.value = vantageCutoff;
        }
        dataLoaded = true;

        const clientSelect = document.getElementById('dashboard-client-filter');
        if (clientSelect && payload.clientList) {
            clientSelect.innerHTML = `<div class="dropdown-item active" data-value="all">All Clients</div>` +
                payload.clientList.map(c => `<div class="dropdown-item" data-value="${c}">${c}</div>`).join('');
        }

        updateHiddenDropdownUI(payload.hiddenClientList);

        buildTimeDropdown(); // Populate date filter with current month + 2 past months
        initializeDashboard(payload.defaultDashboardSettings);
        renderBillingDashboard(billingInsightsData);
        if (payload.userInfo) updateUserProfile(payload.userInfo);
        updateSyncDisplay(payload.lastSyncTime);
        initSyncButton();
        initThemePopup();
        // Details prefetch is chained AFTER billing preload completes (see _silentPreloadBilling)
    }

    function onFailure(error) { 
        setLoading(false); 
        console.error("Server Error:", error);
        showToast(error.message, 'error'); 
    }
    
    // --- DASHBOARD & NAVIGATION LOGIC ---
    function initializeDashboard(defaults) {
        if (defaults) dashboardDefaults = { ...dashboardDefaults, ...defaults };
        
        const timeVal = getDropdownValue('dashboard-time-filter-menu');
        if (timeVal) {
            setDropdownValue('dashboard-time-filter-menu', dashboardDefaults.time);
        }

        // --- NEW: SYNC SETTINGS UI ---
        const timeSetting = document.getElementById('default-time-setting');
        if (timeSetting) timeSetting.value = dashboardDefaults.time;

        const startupTabSetting = document.getElementById('default-startup-tab');
        if (startupTabSetting) startupTabSetting.value = dashboardDefaults.startupTab;

        const billingTabSetting = document.getElementById('default-billing-tab');
        if (billingTabSetting) billingTabSetting.value = dashboardDefaults.billingTab;

        const feeRateSetting = document.getElementById('default-fee-rate');
        if (feeRateSetting) feeRateSetting.value = dashboardDefaults.feeRate;
        // ------------------------------

        // Analytics rendered after async load — skip renderDashboardAnalytics() here
        switchView(dashboardDefaults.startupTab);
    }

    function switchView(viewName, filterOverride = null) {
        document.querySelectorAll('.content-wrapper').forEach(w => w.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(i => { i.classList.remove('active'); i.classList.remove('expanded'); });
        document.querySelectorAll('.submenu-item').forEach(i => { i.classList.remove('active'); i.classList.remove('selected'); });

        
        const navItem = document.querySelector(`.nav-item[data-view="${viewName}"]`);
        if(navItem) {
            if(navItem.classList.contains('nav-has-submenu')) {
                // Billing parent: expand but don't highlight — child subitem owns the active state
                navItem.classList.add('expanded');
            } else {
                navItem.classList.add('active');
            }
        }
        
        const isSettings = viewName === 'settings';
        const target = document.getElementById(`${viewName}-container`);
        if(target) target.style.display = 'flex';
        
        // Settings specific setup
        if (isSettings) updateSettingsUI();

        // Auto-close sidebar on mobile after selecting a view
        document.querySelector('.app-layout').classList.remove('sidebar-open');

        if (!dataLoaded) return;
        
        if (viewName === 'billing') {
            const filter = filterOverride || currentBillingFilter || (dashboardDefaults && dashboardDefaults.billingTab) || 'ready';
            currentBillingFilter = filter;
            const subItem = document.querySelector(`.submenu-item[data-billing-filter="${filter}"]`);
            if(subItem) {
                document.querySelectorAll('.submenu-item').forEach(si => si.classList.remove('active'));
                subItem.classList.add('active');
            }

            updateBillingSubtitle(filter);
            resetAndRenderBilling();
        }
        else if (viewName === 'dashboard' && dashboardAnalytics) renderDashboardAnalytics();
        else if (viewName === 'summary') renderMonthlyHistorySummary();
        else if (viewName === 'invoices') renderInvoiceHistoryTable();
        else if (viewName === 'insights') renderInsights();
    }

    window.navigateToBillingWithSort = function(key, dir) {
        billingSortState.key = key;
        billingSortState.direction = dir;
        switchView('billing', 'ready');
    }

    function getDropdownValue(menuId) {
        const activeItem = document.querySelector(`#${menuId} .dropdown-item.active`);
        return activeItem ? activeItem.dataset.value : null;
    }

    function setDropdownValue(menuId, value) {
        const menu = document.getElementById(menuId);
        if (!menu) return;
        const items = menu.querySelectorAll('.dropdown-item');
        items.forEach(item => {
            const isActive = item.dataset.value === value;
            item.classList.toggle('active', isActive);
            if (isActive) {
                const dropdown = item.closest('.dropdown');
                if (dropdown) {
                    const labelSpan = dropdown.querySelector('.dropdown-toggle span');
                    if (labelSpan) labelSpan.textContent = item.textContent;
                }
            }
        });
    }

    function updateHiddenDropdownUI(hiddenList) {
        const hiddenMenu = document.getElementById('hidden-clients-menu');
        const hiddenDropdown = document.getElementById('hidden-clients-dropdown');
        if (!hiddenMenu || !hiddenDropdown) return;
        
        // Preserve currently selected "extraClients" (unchecked items)
        const currentlyIncluded = getSelectedHiddenClients();
        
        if (!hiddenList || hiddenList.length === 0) {
            hiddenDropdown.style.display = 'none';
            return;
        }
        
        hiddenDropdown.style.display = '';
        const existing = hiddenMenu.querySelector('.dropdown-header');
        const header = existing ? existing.outerHTML : `<div class="dropdown-header" style="padding: 6px 14px 4px; font-size: 11px; font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Hidden Clients</div>`;
        
        hiddenMenu.innerHTML = header + hiddenList.map(c => {
            const isSelected = !currentlyIncluded.includes(c); // selected = hidden
            const classStr = isSelected ? `dropdown-item hidden-client-option selected` : `dropdown-item hidden-client-option`;
            const btnLabel = isSelected ? 'Unhide' : 'Hide';

            return `<div class="${classStr}" data-value="${c}" style="display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:default;">
                <span style="flex:1;font-size:13px;">${c}</span>
                <button class="hc-toggle-btn" style="font-size:13px;font-weight:500;color:var(--color-brand);background:#FAFAFA;border:1px solid var(--color-brand);border-radius:4px;padding:1px 7px;cursor:pointer;white-space:nowrap;line-height:1.5;">${btnLabel}</button>
            </div>`;
        }).join('');

        hiddenMenu.querySelectorAll('.hidden-client-option .hc-toggle-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const skel = document.getElementById('overview-skeleton');
                if (skel && skel.style.display !== 'none') return;
                toggleHiddenClient(btn.closest('.hidden-client-option'));
            });
        });
        
        const hiddenCount = getCurrentlyHiddenClients().length;
        const labelEl = document.querySelector('#hidden-clients-label span');
        if (labelEl) labelEl.textContent = hiddenCount === 0 ? 'Hidden: None' : `Hidden: ${hiddenCount}`;
    }

    function getSelectedHiddenClients() {
        // Unchecked items are the ones we want to INCLUDE in the data (backend expects extraClients to include)
        return [...document.querySelectorAll('.hidden-client-option:not(.selected)')].map(el => el.dataset.value);
    }

    function getCurrentlyHiddenClients() {
        // Checked items are the ones currently HIDDEN
        return [...document.querySelectorAll('.hidden-client-option.selected')].map(el => el.dataset.value);
    }

    function setHiddenBtnsDisabled(disabled) {
        document.querySelectorAll('.hc-toggle-btn').forEach(b => {
            b.disabled = disabled;
            b.style.opacity = disabled ? '0.4' : '1';
            b.style.cursor = disabled ? 'not-allowed' : 'pointer';
        });
    }

    function toggleHiddenClient(el) {
        const isSelected = el.classList.toggle('selected'); // selected = HIDDEN
        const btn = el.querySelector('.hc-toggle-btn');
        if (btn) btn.textContent = isSelected ? 'Unhide' : 'Hide';
        const hiddenCount = getCurrentlyHiddenClients().length;
        const labelEl = document.querySelector('#hidden-clients-label span');
        if (labelEl) labelEl.textContent = hiddenCount === 0 ? 'Hidden: None' : `Hidden: ${hiddenCount}`;

        const extraClientsToInclude = getSelectedHiddenClients();

        const skel = document.getElementById('overview-skeleton');
        const real = document.getElementById('overview-real-content');
        if (skel) skel.style.display = '';
        if (real) real.style.display = 'none';
        setHiddenBtnsDisabled(true);
        google.script.run
            .withSuccessHandler(data => {
                billingSummaryData = data.billingSummary;
                historyData = data.history;
                billedCaseIdSet = new Set(data.billedIds.map(String));
                billingInsightsData = data.billingInsights;
                loadDashboardAnalytics();
            })
            .withFailureHandler(err => { setLoading(false); onFailure(err); })
            .getBillingAndHistoryData(extraClientsToInclude);
    }

    // Build the date filter dropdown dynamically with current month + 2 past months + extras
    function buildTimeDropdown() {
        const menu = document.getElementById('dashboard-time-filter-menu');
        if (!menu) return;
        const now = new Date();
        const fmtMonth = (d) => d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        const fmtValue = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');

        const months = [
            { value: 'thisMonth', label: 'Current Month' },
            ...Array.from({ length: 2 }, (_, i) => {
                const d = new Date(now.getFullYear(), now.getMonth() - (i + 1), 1);
                return { value: fmtValue(d), label: fmtMonth(d) };
            })
        ];
        const extras = [
            { value: 'last90Days', label: 'Last 90 Days' },
            { value: 'lifetime',   label: 'All Time' },
        ];
        const pickers = [
            { value: 'specificMonth', label: 'Specific Month…' },
            { value: 'custom',        label: 'Custom Range…' },
        ];

        const makeItem = ({ value, label }, isActive) =>
            `<div class="dropdown-item${isActive ? ' active' : ''}" data-value="${value}">${label}</div>`;

        menu.innerHTML =
            months.map((o, i) => makeItem(o, i === 0)).join('') +
            '<div class="dropdown-divider"></div>' +
            extras.map(o => makeItem(o, false)).join('') +
            '<div class="dropdown-divider"></div>' +
            pickers.map(o => makeItem(o, false)).join('');
    }

    function loadDashboardAnalytics(silent = false) {
        const clientFilter = getDropdownValue('dashboard-client-filter') || 'all';
        const rawFilter    = getDropdownValue('dashboard-time-filter-menu') || 'thisMonth';
        const extraClients = getSelectedHiddenClients();

        // YYYY-MM values from named month items → treat as specificMonth
        const isYYYYMM = /^\d{4}-\d{2}$/.test(rawFilter);
        const timeFilter = isYYYYMM ? 'specificMonth' : rawFilter;
        let startDate = null;
        let endDate = null;

        if (isYYYYMM) {
            startDate = rawFilter + '-01'; // YYYY-MM-01 → server parses year/month
        } else if (rawFilter === 'custom') {
            startDate = document.getElementById('dashboard-start-date').value;
            endDate   = document.getElementById('dashboard-end-date').value;
            if (!startDate || !endDate) { showToast('Please select start and end dates', 'error'); return; }
        } else if (rawFilter === 'specificMonth') {
            startDate = document.getElementById('dashboard-month-picker').value;
            if (!startDate) return;
        }

        if (!silent) {
            const skel = document.getElementById('overview-skeleton');
            const real = document.getElementById('overview-real-content');
            if (skel) skel.style.display = '';
            if (real) real.style.display = 'none';
        }
        google.script.run
            .withSuccessHandler((data) => {
                dashboardAnalytics = data;
                renderDashboardAnalytics();
                chatSystemContext = buildChatContext();
                seedChatDate();
                // Silently preload fresh billing + history data in background after overview renders
                _silentPreloadBilling();
            })
            .withFailureHandler(silent ? (e) => console.error('Analytics load failed:', e) : onFailure)
            .getDashboardAnalytics(timeFilter, startDate, endDate, clientFilter, extraClients);
    }

    function renderDashboardAnalytics() {
        if (!dashboardAnalytics) return;
        // Swap skeleton → real content
        const skel = document.getElementById('overview-skeleton');
        const real = document.getElementById('overview-real-content');
        if (skel) skel.style.display = 'none';
        if (real) real.style.display = 'block';
        setHiddenBtnsDisabled(false);

        if (dashboardAnalytics.dynamicHiddenClients) {
            updateHiddenDropdownUI(dashboardAnalytics.dynamicHiddenClients);
        }

        const { metrics, trends, dailyData, categoryData, monthlyHistory, dateRange } = dashboardAnalytics;

        const rawFilter = getDropdownValue('dashboard-time-filter-menu') || 'thisMonth';
        const isCurrentMonth = rawFilter === 'thisMonth';

        let displayRecovered = 0;
        let displayFees = 0;
        let displayCases = 0;
        let displayTotalPrev = 0; // Total Fees Billed

        const startRange = new Date(dashboardAnalytics.dateRange.start);
        const endRange = new Date(dashboardAnalytics.dateRange.end);
        startRange.setHours(0,0,0,0);
        endRange.setHours(23,59,59,999);

        if (billingSummaryData) {
            billingSummaryData.forEach(client => {
                const periodDate = new Date();
                if (periodDate >= startRange && periodDate <= endRange) {
                    const fee = client.readyToBillFee || 0;
                    if (fee > 0.001) {
                        displayFees += fee;
                        displayRecovered += (client.totalReimbursed || 0);
                        displayCases += (client.readyToBillCases || 0);
                    }
                    displayTotalPrev += (client.previouslyBilledFee || 0);
                }
            });
        }

        const extraClientsToInclude = getSelectedHiddenClients().map(c => c.toLowerCase());
        const isVantageIncluded = extraClientsToInclude.includes('vantage inc');

        if (historyData) {
            historyData.forEach(inv => {
                const invClientName = (inv.clientName || '').toLowerCase();
                if (!isVantageIncluded && invClientName === 'vantage inc' && new Date(inv.billedDate) < new Date(vantageCutoff + 'T00:00:00')) return;

                let billedDate = new Date(inv.billedDate);
                if (inv.clientName === 'TheSavingsMart' && new Date(inv.rmsPostingDate || inv.billedDate).toLocaleDateString() === '1/23/2026') {
                    billedDate = new Date('2026-02-02T12:00:00Z');
                }
                const periodDate = new Date(billedDate);
                if (billedDate.getDate() <= 7) periodDate.setMonth(periodDate.getMonth() - 1);

                if (periodDate >= startRange && periodDate <= endRange) {
                    const feeAmount = parseCurrency(inv.billedFee);
                    const recAmount = inv.totalReimbursed ? parseCurrency(inv.totalReimbursed) : 0;
                    
                    displayFees += feeAmount;
                    displayRecovered += recAmount;
                    displayCases += 1;
                    
                    if (!isCurrentMonth) {
                        displayTotalPrev += feeAmount;
                    }
                }
            });
        }

        // Vantage free-period: never invoiced, so historyData misses them. Add the analytics-computed amount when toggled.
        if (isVantageIncluded && dashboardAnalytics.vantageFreePeriodAmount) {
            displayRecovered += dashboardAnalytics.vantageFreePeriodAmount;
        }

        // Metric 1: Total Recovered
        const recoveredEl = document.getElementById('dashboard-total-recovered');
        if (recoveredEl) {
            animateCounter(recoveredEl, displayRecovered, formatCurrencyHTML);
            renderTrend(trends.totalReimbursed, 'dashboard-recovered');
        }

        // Metric 2: Total Fees
        const feesEl = document.getElementById('dashboard-total-fees');
        if (feesEl) {
            animateCounter(feesEl, displayFees, formatCurrencyHTML);
            renderTrend(trends.totalFees, 'dashboard-fees');
        }

        // Metric 3: Approved Cases
        const approvedEl = document.getElementById('dashboard-approved-cases');
        if (approvedEl) {
            animateCounter(approvedEl, displayCases, v => Math.round(v).toString());
            renderTrend(trends.approvedCases, 'dashboard-approved');
        }

        // Metric 4: Total Fees Billed
        const prevEl = document.getElementById('dashboard-previously-reimbursed');
        if (prevEl) {
            animateCounter(prevEl, displayTotalPrev, formatCurrencyHTML);
            renderTrend(0, 'dashboard-prev-reimbursed');
        }

        // Update Dashboard Date Range Title
        const dateRangeEl = document.getElementById('dashboard-date-range-display');
        if (dateRangeEl && dashboardAnalytics.dateRange) {
            const start = new Date(dashboardAnalytics.dateRange.start);
            const end = new Date(dashboardAnalytics.dateRange.end);
            const opt = { day: 'numeric', month: 'short', year: 'numeric' };
            dateRangeEl.textContent = `${start.toLocaleDateString('en-GB', opt)} - ${end.toLocaleDateString('en-GB', opt)}`;
        }
        
        renderWeeklyChart(dailyData); 
        renderCategoryChart(categoryData); 
        renderCategoryTotalsTable(categoryData);

        const historyTable = document.getElementById('dashboard-monthly-history-table');
        if (historyTable && monthlyHistory) {
            // Keep code here if it exists anywhere else, but since we replaced standard table, we just render the chart
            renderMonthlySummaryChart(monthlyHistory);
        } else if (monthlyHistory) {
            // Because we removed the table and added canvas, we trigger chart render
            renderMonthlySummaryChart(monthlyHistory);
        }
    }

    let monthlySummaryChart = null;

    function renderMonthlySummaryChart(monthlyHistory) {
        const canvas = document.getElementById('monthly-summary-chart'); 
        if (!canvas) return;
        if (monthlySummaryChart) monthlySummaryChart.destroy();
        
        const ctx = canvas.getContext('2d');
        const colors = getChartColors();
        const brandColor = colors.brandColor;
        
        // Use analytics monthlyHistory for bar values — includes Vantage free-period in correct month
        const sortedHistory = (monthlyHistory || []).slice().sort((a, b) => a.sort.localeCompare(b.sort));
        const chartData = sortedHistory.slice(-8).map(h => ({ label: h.label, recovered: h.recovered, fee: h.fee }));

        
        // Gradient fill
        const grad = ctx.createLinearGradient(0, 0, 0, 260);
        grad.addColorStop(0, brandColor);
        grad.addColorStop(1, brandColor + '40');

        // Inactive bar color
        const maxVal = Math.max(...chartData.map(d => d.recovered)) || 1;
        const bgColors = chartData.map(d => {
            const intensity = d.recovered / maxVal; // 0..1
            const alpha = Math.round((0.42 + intensity * 0.58) * 255).toString(16).padStart(2, '0');
            return brandColor + alpha;
        });

        // Inline datalabels plugin
        const topLabelsPlugin = {
            id: 'topLabels',
            afterDatasetsDraw(chart) {
                const { ctx: c, data, chartArea: { top } } = chart;
                chart.getDatasetMeta(0).data.forEach((bar, i) => {
                    const val = data.datasets[0].data[i];
                    if (!val) return;
                    const label = '$' + new Intl.NumberFormat('en-US').format(Math.round(val));
                    c.save();
                    c.font = '700 13px Inter, sans-serif';
                    c.fillStyle = '#0f172a';
                    c.textAlign = 'center';
                    c.fillText(label, bar.x, bar.y - 6);
                    c.restore();
                });
            }
        };

        monthlySummaryChart = new Chart(ctx, {
            type: 'bar',
            plugins: [topLabelsPlugin],
            data: {
                labels: chartData.map(d => {
                    const parts = d.label.split(' ');
                    return parts[0].substring(0, 3);
                }),
                datasets: [{
                    label: 'Recovered',
                    data: chartData.map(d => d.recovered),
                    backgroundColor: bgColors,
                    borderWidth: 0,
                    borderRadius: 8,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 900, easing: 'easeInOutCubic' },
                layout: { padding: { top: 24 } },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        enabled: false,
                        external: function(context) {
                            let tooltipEl = document.getElementById('chart-tooltip');
                            if (!tooltipEl) {
                                tooltipEl = document.createElement('div');
                                tooltipEl.id = 'chart-tooltip';
                                tooltipEl.className = 'custom-tooltip';
                                document.body.appendChild(tooltipEl);
                            }
                            const tooltipModel = context.tooltip;
                            if (tooltipModel.opacity === 0) { tooltipEl.style.opacity = 0; return; }
                            const idx = tooltipModel.dataPoints && tooltipModel.dataPoints[0] ? tooltipModel.dataPoints[0].dataIndex : null;
                            if (idx === null) return;
                            const d = chartData[idx];
                            const monthLabel = d ? d.label : '';
                            tooltipEl.innerHTML = `
                                <div class="tooltip-title">${monthLabel.toUpperCase()}</div>
                                <div class="tooltip-row"><div class="tooltip-left"><span class="tooltip-label">Recovered</span></div><div class="tooltip-value">${formatCurrency(d ? d.recovered : 0)}</div></div>
                                <div class="tooltip-row"><div class="tooltip-left"><span class="tooltip-label">Fees</span></div><div class="tooltip-value">${formatCurrency(d ? d.fee : 0)}</div></div>
                            `;
                            const position = context.chart.canvas.getBoundingClientRect();
                            tooltipEl.style.opacity = 1;
                            tooltipEl.style.left = position.left + tooltipModel.caretX + 'px';
                            tooltipEl.style.top = position.top + tooltipModel.caretY - 10 + 'px';
                        }
                    }
                },
                scales: {
                    y: { display: false, beginAtZero: true },
                    x: {
                        ticks: { color: '#94a3b8', font: { size: 11, weight: '500' } },
                        grid: { display: false },
                        border: { display: false }
                    }
                }
            }
        });
    }

        if (tableBody) tableBody.insertAdjacentHTML('beforeend', next.map(s => buildBillingRow(s, showCheckboxes)).join(''));

    function getFilteredBillingClients() {
        const globalSearchEl = document.getElementById('global-search');
        const tabSearchEl = document.getElementById('billing-tab-search');
        let searchTerm = '';
        if (tabSearchEl && tabSearchEl.value.trim().length > 0) {
            searchTerm = tabSearchEl.value.toLowerCase().trim();
        } else if (globalSearchEl && globalSearchEl.value.trim().length > 0) {
            searchTerm = globalSearchEl.value.toLowerCase().trim();
        }
        const summaryFilter = getActiveBillingFilter();

        return billingSummaryData.filter(s => {
            if (!s.isBillableClient) return false;
            const matchesSearch = searchTerm && s.clientName.toLowerCase().includes(searchTerm);
            const hasActivity = (s.readyToBillFee > 0 || s.previouslyBilledFee > 0 || s.totalReimbursed > 0 || (s.pendingFee || 0) > 0);
            if (!hasActivity && !matchesSearch) return false;

            if (searchTerm) return matchesSearch;
            if (summaryFilter === 'ready') return s.readyToBillFee > 0;
            if (summaryFilter === 'pending') return (s.pendingFee || 0) > 0;
            if (summaryFilter === 'billed') return s.previouslyBilledFee > 0 && s.readyToBillFee === 0;
            if (summaryFilter === 'overdue') return s.hasPreviousMonthBill && s.readyToBillFee > 0;
            return true;
        });
    }

    function renderMarkdown(text) {
        // Escape HTML first
        var escaped = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
        // Bold **text**
        escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        // Split into lines and process
        var lines = escaped.split('\n');
        var html = '';
        var inOl = false;
        var inUl = false;
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            var olMatch = line.match(/^(\d+)\.\s+(.*)/);
            var ulMatch = line.match(/^[-*]\s+(.*)/);
            if (olMatch) {
                if (!inOl) { if (inUl) { html += '</ul>'; inUl = false; } html += '<ol>'; inOl = true; }
                html += '<li>' + olMatch[2] + '</li>';
            } else if (ulMatch) {
                if (!inUl) { if (inOl) { html += '</ol>'; inOl = false; } html += '<ul>'; inUl = true; }
                html += '<li>' + ulMatch[1] + '</li>';
            } else {
                if (inOl) { html += '</ol>'; inOl = false; }
                if (inUl) { html += '</ul>'; inUl = false; }
                if (line.trim() === '') {
                    html += '<p></p>';
                } else {
                    html += '<p>' + line + '</p>';
                }
            }
        }
        if (inOl) html += '</ol>';
        if (inUl) html += '</ul>';
        return html;
    }

    function appendChatBubble(text, role, isError) {
        var messagesEl = document.getElementById('chat-messages');
        var emptyState = document.getElementById('chat-empty-state');
        if (emptyState) emptyState.style.display = 'none';
        chatSetActive();

        var row = document.createElement('div');

        if (role === 'user') {
            row.className = 'wfs-chat-user-row';
            var bubble = document.createElement('div');
            bubble.className = 'wfs-chat-bubble-user';
            bubble.textContent = text;
            row.appendChild(bubble);
        } else {
            row.className = 'wfs-chat-ai-row';
            var avatar = document.createElement('div');
            avatar.className = 'wfs-chat-ai-avatar';
            avatar.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.09 6.26L20 10l-5.91 1.74L12 18l-2.09-5.26L4 11l5.91-1.74z"/></svg>';
            var content = document.createElement('div');
            content.className = 'wfs-chat-ai-content';
            if (isError) {
                content.innerHTML = '<span class="ai-error">' + text + '</span>';
                var retryBtn = document.createElement('button');
                retryBtn.className = 'chat-retry-btn';
                retryBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-3.85"></path></svg> Retry';
                (function(lastUserText) {
                    retryBtn.addEventListener('click', function() {
                        row.parentNode.removeChild(row);
                        sendChatMessage(lastUserText);
                    });
                })(chatHistory.length > 0 ? chatHistory[chatHistory.length - 1].parts[0].text : '');
                content.appendChild(retryBtn);
            } else {
                content.innerHTML = renderMarkdown(text);
            }
            row.appendChild(avatar);
            row.appendChild(content);
        }

        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return row;
    }

    function removeChatTyping() {

    function sendChatMessage(text) {
        if (chatBusy || !text.trim()) return;
        text = text.trim();
        chatBusy = true;

        var sendBtn = document.getElementById('chat-send-btn');
        var inputEl = document.getElementById('chat-input');
        if (sendBtn) sendBtn.disabled = true;
        if (inputEl) inputEl.value = '';

        appendChatBubble(text, 'user');
        showChatTyping();

        chatHistory.push({ role: 'user', parts: [{ text: text }] });

        google.script.run
            .withSuccessHandler(function(result) {
                removeChatTyping();
                chatBusy = false;
                if (sendBtn) sendBtn.disabled = false;
                if (result.error) {
                    appendChatBubble('Error: ' + result.error, 'ai', true);
                } else {
                    var reply = result.text || '(no response)';
                    appendChatBubble(reply, 'ai');
                    chatHistory.push({ role: 'model', parts: [{ text: reply }] });
                }
            })
            .withFailureHandler(function(err) {
                removeChatTyping();
                chatBusy = false;
                if (sendBtn) sendBtn.disabled = false;
                appendChatBubble('Error: ' + err.message, 'ai', true);
            })
            .callGeminiAPI({ contents: chatHistory, systemContext: chatSystemContext });
    }

    function renderInvoiceHistoryTable() {
        const searchTerm = document.getElementById('invoices-tab-search').value.toLowerCase().trim();
        const tableBody = document.getElementById('history-table');
        
        const isVantageIncluded = getSelectedHiddenClients().map(c => c.toLowerCase()).includes('vantage inc');
        const filteredHistory = historyData.filter(item => {
            const clientName = (item.clientName || '').toLowerCase();
            const invNum = (item.invoiceNumber || '').toLowerCase();
            const billedDate = item.billedDate ? new Date(item.billedDate).toLocaleDateString().toLowerCase() : '';
            
            if (!isVantageIncluded && clientName === 'vantage inc' && new Date(item.billedDate) < new Date(vantageCutoff + 'T00:00:00')) return false;
            if (!searchTerm) return true;
            
            // Fuzzy invoice match: remove non-alphanumeric for comparison
            const normalizedInv = invNum.replace(/[^a-z0-9]/g, '');
            const normalizedSearch = searchTerm.replace(/[^a-z0-9]/g, '');
            
            const matches = clientName.includes(searchTerm) || 
                            invNum.includes(searchTerm) || 
                            (normalizedSearch && normalizedInv.includes(normalizedSearch)) ||
                            billedDate.includes(searchTerm);
            
            if (!matches && clientName === 'thesavingsmart' && invNum === '-' && 'nv-1042a'.includes(searchTerm)) return true;
            return matches;
        });

        renderPaginationControls(filteredHistory.length, 'history');
        const paginated = filteredHistory.slice((historyCurrentPage - 1) * historyItemsPerPage, historyCurrentPage * historyItemsPerPage);
        
        if (paginated.length === 0) { tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No results found</td></tr>`; return; }

        tableBody.innerHTML = paginated.map(item => {
            let invNum = item.invoiceNumber;
            if (item.clientName === 'TheSavingsMart' && invNum === '-') invNum = 'NV-1042a';
            const invCell = item.pdfUrl

        window.showSearchSuggestions = function(query) {
            const q = query.toLowerCase().trim();
            suggestionIndex = -1;
            
            const actions = [
                { label: 'View All Invoices', view: 'invoices', icon: 'file-text' },
                { label: 'Monthly Summary', view: 'summary', icon: 'bar-chart-2' },
                { label: 'Create New Invoice', view: 'builder', icon: 'plus-square' }
            ];

            if (q === '') {
                const recentNames = getRecentSearches();
                const recentClients = (billingSummaryData || []).filter(c => recentNames.includes(c.clientName));
                renderSuggestions(actions, recentClients, true, [], []);
                return;
            }

            const matchingActions = actions.filter(a => a.label.toLowerCase().includes(q));
            const matchingClients = (billingSummaryData || []).filter(c => c.clientName.toLowerCase().includes(q)).slice(0, 8);
            
            // Match Months
            const months = ['january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december'];
            const matchingMonths = months.filter(m => m.includes(q) && q.length >= 2).map(m => m.charAt(0).toUpperCase() + m.slice(1));

            // Match Invoice Patterns - improved fuzzy across historyData
            let matchingInvoices = [];
            if (q.length >= 2) {
                const normQ = q.replace(/[^a-z0-9]/g, '');
                const uniqueInvs = new Set();
                (historyData || []).forEach(inv => {
                    const invNum = inv.invoiceNumber || '';
                    const normInv = invNum.toLowerCase().replace(/[^a-z0-9]/g, '');
                    if (normInv.includes(normQ)) {
                        uniqueInvs.add(invNum);
                    }
                });
                matchingInvoices = Array.from(uniqueInvs).slice(0, 4);
            }

            if (matchingActions.length === 0 && matchingClients.length === 0 && matchingMonths.length === 0 && matchingInvoices.length === 0) {
                suggestionsBox.classList.remove('show');
                return;
            }

            renderSuggestions(matchingActions, matchingClients, false, matchingMonths, matchingInvoices);
        };

        function renderSuggestions(actions, clients, isRecent, months, invoices) {
            let html = '';
            
            // 1. Invoices
            if (invoices && invoices.length > 0) {
                html += '<div class="suggestion-group-title">Invoices</div>';
                invoices.forEach(inv => {
                    html += `<div class="suggestion-item" onclick="selectInvoiceFromSearch('${inv}')">
                        <span>Go to Invoice <strong>${inv}</strong></span></div>`;
                });
            }

            // 2. Months
            if (months && months.length > 0) {
                html += '<div class="suggestion-group-title">Monthly Summary</div>';
                months.forEach(m => {
                    html += `<div class="suggestion-item" onclick="selectMonthFromSearch('${m}')">
                        <span>View <strong>${m}</strong> Summary</span></div>`;
                });
            }

            // 3. Quick Actions (Standard)
            if (actions.length > 0 && !isRecent) {
                html += '<div class="suggestion-group-title">Quick Actions</div>';
                actions.forEach(a => {
                    html += `<div class="suggestion-item" onclick="switchView('${a.view}'); document.getElementById('global-search-suggestions').classList.remove('show');">
                        <span>${a.label}</span></div>`;
                });
            }

            // 4. Clients / Recent
            if (clients.length > 0) {
                html += `<div class="suggestion-group-title">${isRecent ? 'Recent Searches' : 'Clients'}</div>`;
                clients.forEach(c => {
                    html += `<div class="suggestion-item" onclick="selectClientFromSearch('${c.clientName.replace(/'/g, "\\'")}');">
                        <span>${c.clientName}</span><span class="suggestion-meta">${c.readyToBillCases > 0 ? c.readyToBillCases + ' Ready' : 'Billed'}</span></div>`;
                });
            }

            // 5. Quick Actions (If Recent)
            if (isRecent && actions.length > 0) {
                 html += '<div class="suggestion-group-title" style="margin-top:8px;">Quick Actions</div>';
                 actions.forEach(a => {
                    html += `<div class="suggestion-item" onclick="switchView('${a.view}'); document.getElementById('global-search-suggestions').classList.remove('show');">
                        <span>${a.label}</span></div>`;
                });
            }
            
            suggestionsBox.innerHTML = html;
            suggestionsBox.classList.add('show');
        }

    // --- OTHER HELPERS ---
    function renderTrend(trendValue, metricId) {
        const trendEl = document.getElementById(`${metricId}-trend`);
        if (!trendEl) return;

        const timeFilter = getDropdownValue('dashboard-time-filter-menu') || 'thisMonth';
        let timeRangeText = 'previous period';
        if (timeFilter === 'thisMonth') timeRangeText = 'last month';
        if (timeFilter === '90days' || timeFilter === 'last90Days') timeRangeText = 'prev 90 days';
        if (timeFilter === '30days' || timeFilter === 'last30Days') timeRangeText = 'prev 30 days';
        if (/^\d{4}-\d{2}$/.test(timeFilter)) {
            const [y, m] = timeFilter.split('-').map(Number);
            const prev = new Date(y, m - 2, 1);
            timeRangeText = prev.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        }

        // Hide for lifetime as there's no comparison
        if (timeFilter === 'lifetime') {
            trendEl.style.display = 'none';
            return;
        }
        
        trendEl.style.display = 'flex';
        
        
        // Normalize trendValue
        const val = parseFloat(trendValue);
        if (isNaN(val)) {
            trendEl.innerHTML = '';
            return;
        }

        const isPositive = val >= 0;
        const trendClass = isPositive ? 'positive' : 'negative';
        const displayVal = Math.abs(val).toFixed(0);
        const icon = isPositive ? 'arrow-up' : 'arrow-down';
        
        trendEl.className = `metric-trend ${trendClass}`;
        trendEl.innerHTML = `
            <span class="metric-trend-pill">
                <i class="icon" data-icon="${icon}" style="width: 10px; height: 10px;"></i>
                ${displayVal}%
            </span>
            <span>vs ${timeRangeText}</span>
        `;
    }

    function updateSyncDisplay(isoTimestamp) {
        const el = document.getElementById('last-sync-display');
        if (!el) return;
        const d = isoTimestamp ? new Date(isoTimestamp) : new Date();
        const now = new Date();
        const isToday = d.toDateString() === now.toDateString();
        const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        el.textContent = isToday
            ? `Today ${timeStr}`
            : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ` ${timeStr}`;
    }

    function renderPaginationControls(totalItems, type) {
        const itemsPerPageLocal = type === 'history' ? historyItemsPerPage : (type === 'summary' ? summaryItemsPerPage : itemsPerPage);
        let itemsPer = itemsPerPageLocal, currentP, infoId, prevId, nextId;
        
        if (type === 'billing') {
            currentP = billingCurrentPage;
            infoId = 'pagination-info';
            prevId = 'prev-page-btn';
            nextId = 'next-page-btn';
        } else if (type === 'invoices' || type === 'history') {
            itemsPer = historyItemsPerPage;
            currentP = historyCurrentPage;
            infoId = 'history-pagination-info';
            prevId = 'history-prev-page-btn';
            nextId = 'history-next-page-btn';
        } else if (type === 'summary') {
            itemsPer = summaryItemsPerPage;
            currentP = summaryCurrentPage;
            infoId = 'summary-pagination-info';
            prevId = 'summary-prev-page-btn';
            nextId = 'summary-next-page-btn';
        }

        const totalPages = Math.ceil(totalItems / itemsPer) || 1;
        const infoEl = document.getElementById(infoId);
        
        if (infoEl) {
            infoEl.innerHTML = `
                <span class="long-text">Page ${currentP} of ${totalPages}</span>
                <span class="short-text">${currentP}/${totalPages}</span>
            `;
        }
        
        const prevBtn = document.getElementById(prevId);
        const nextBtn = document.getElementById(nextId);
        if (prevBtn) prevBtn.disabled = currentP === 1;
        if (nextBtn) nextBtn.disabled = currentP >= totalPages;
    }

    function getChartColors() {

    function renderWeeklyChart(dailyData) {
        const canvas = document.getElementById('weekly-chart'); if (!canvas) return;
        if (weeklyChart) weeklyChart.destroy();
        const ctx = canvas.getContext('2d');
        const colors = getChartColors();
        const brandGradient = ctx.createLinearGradient(0, 0, 0, 260);
        brandGradient.addColorStop(0, `${colors.brandColor}99`);
        brandGradient.addColorStop(0.5, `${colors.brandColor}40`);
        brandGradient.addColorStop(1, `${colors.brandColor}00`);
        const accent = getComputedStyle(document.body).getPropertyValue('--color-accent-orange').trim() || '#f97316';

        const chartData = dashboardAnalytics && dashboardAnalytics.chartData;
        const labels = chartData ? chartData.labels : [];
        const currentData = chartData ? chartData.current : [];
        const prevData = chartData ? chartData.previous : [];
        const curLabel = chartData ? chartData.curMonthLabel : 'This Month';
        const prevLabel = chartData ? chartData.prevMonthLabel : 'Last Month';
        const isHistorical = chartData && chartData.isHistorical;

        const extraPrevMonths = (chartData && chartData.extraPrevMonths) || [];
        const prevCountStored = parseInt(localStorage.getItem('chartPrevMonths') || '1', 10);
        const prevCount = Math.min(Math.max(prevCountStored, 1), 5);

        document.getElementById('weekly-chart-header').innerHTML = `
            <h2 style="font-size: 16px; font-weight: 600; color: var(--color-text-primary); margin: 0;">Monthly comparison</h2>
            <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
                <span style="font-size:12px;color:var(--color-text-secondary);font-weight:500;">Compare</span>
                <select id="prev-months-select" style="height:26px;padding:0 8px;font-size:12px;font-weight:600;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-surface);color:var(--color-text-primary);cursor:pointer;outline:none;">
                    ${[1,2,3,4,5].map(n => `<option value="${n}"${n===prevCount?' selected':''}>${n} prev month${n>1?'s':''}</option>`).join('')}
                </select>
            </div>
        `;

        document.getElementById('prev-months-select').addEventListener('change', function() {
            localStorage.setItem('chartPrevMonths', this.value);
            renderWeeklyChart(dailyData);
        });

        const maxChartDays = labels.length;
        // Palette for prev month lines (most recent = accent orange, older = fading grays)
        const prevPalette = [accent, '#94a3b8', '#cbd5e1', '#b0bec5', '#90a4ae'];
        const extraDatasets = [];
        for (let i = 0; i < prevCount - 1; i++) {

            extraDatasets.push({

                backgroundColor: 'transparent',

            });

        weeklyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Current 30d', data: currentData, borderColor: colors.brandColor, backgroundColor: brandGradient, fill: true, tension: 0.4, pointRadius: 0, pointHoverRadius: 5, borderWidth: 2, pointBackgroundColor: colors.brandColor, pointBorderWidth: 0 },
                    { label: prevLabel, data: prevData, borderColor: accent, backgroundColor: 'transparent', fill: false, tension: 0.4, pointRadius: 0, borderWidth: 1.5, spanGaps: true, order: 1 },
                    ...extraDatasets
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 900, easing: 'easeInOutCubic' },
                interaction: { mode: 'index', intersect: false },
                layout: { padding: { left: 24, right: 24, top: 12, bottom: 12 } },
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        enabled: false,
                        external: function(context) { 
                            let tooltipEl = document.getElementById('chart-tooltip');
                            if (!tooltipEl) {
                                tooltipEl = document.createElement('div');
                                tooltipEl.id = 'chart-tooltip';
                                tooltipEl.className = 'custom-tooltip';
                                document.body.appendChild(tooltipEl);
                            }
                            const tooltipModel = context.tooltip;
                            if (tooltipModel.opacity === 0) {
                                tooltipEl.style.opacity = 0;
                                return;
                            }
                            if (tooltipModel.body) {
                                const titleLines = tooltipModel.title || [];
                                let innerHtml = `<div class="tooltip-title">${titleLines[0] || 'RECOVERY TREND'}</div>`;
                                tooltipModel.dataPoints.forEach((dataPoint, i) => {
                                    const toolColors = tooltipModel.labelColors[i];
                                    const color = toolColors.borderColor || toolColors.backgroundColor;
                                    const label = dataPoint.dataset.label;
                                    const value = dataPoint.raw;
                                    innerHtml += `
                                        <div class="tooltip-row">
                                            <div class="tooltip-left">
                                                <span class="tooltip-pill" style="background-color: ${color}"></span>
                                                <span class="tooltip-label">${label}</span>

                            const screenPad = 20;
                            if (leftPos + (tooltipWidth / 2) > window.innerWidth - screenPad) {
                                leftPos = window.innerWidth - screenPad - (tooltipWidth / 2);
                            } else if (leftPos - (tooltipWidth / 2) < screenPad) {
                                leftPos = screenPad + (tooltipWidth / 2);
                            }

                            tooltipEl.style.top = position.top + tooltipModel.caretY - 10 + 'px';
                        }
                    }
                }, 

                scales: { 
                    y: {
                        beginAtZero: true,
                        ticks: { callback: v => '$' + v, color: '#94a3b8', font: { size: 10 } },
                        grid: { display: false },
                        border: { display: false }
                    },
                    x: {
                        ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 14, color: '#94a3b8', font: { size: 10 } },
                        grid: { display: false },
                        border: { display: false }
                    }
                } 
            }
        });
    }

    
    function getCategoryColors(brand, n) {
        return Array.from({ length: n }, (_, i) => {
            const t = n === 1 ? 1 : 1 - (i / (n - 1)) * 0.58;
            const alpha = Math.round(t * 255).toString(16).padStart(2, '0');
            return brand + alpha;
        });
    }

    function showToast(message, type = 'success') {

    // A case is billable now only if its RMS Posting Date exists AND is not in a future month.
    // No posting date = not reimbursed yet. Future-month posting = held for next month's run.
    // Kept separate from isCaseBillable so already-billed cases still render in the billed view.
    function _isBillablePosting(item) {
        const raw = item['RMS Posting Date'];
        if (!raw) return false;
        const d = new Date(raw);
        if (isNaN(d.getTime())) return false;
        const now = new Date();
        const startOfNextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        return d < startOfNextMonth;
    }

    function isCaseBillable(item, clientInfo) {
        const isVantageIncluded = getSelectedHiddenClients().map(c => c.toLowerCase()).includes('vantage inc');
        const csvName = item['Client Name']?.trim(); if (!csvName) return false;
        if (!isVantageIncluded && csvName.toLowerCase() === 'vantage inc') {
            const postingDate = item['RMS Posting Date'] ? new Date(item['RMS Posting Date']) : null;
            if (!postingDate || postingDate < new Date(vantageCutoff + 'T00:00:00')) return false;
        }
        let info = clientInfo;
        if (!info) { info = clientOnboardingInfo[csvName]; if (!info) { const k = Object.keys(clientOnboardingInfo).find(k => k.toLowerCase() === csvName.toLowerCase()); if(k) info = clientOnboardingInfo[k]; } }
        if (!info || info.status !== 'Client') { if (csvName === 'Premium Convenience') return true; return false; }
        const startStr = info.pilotEndDate || info.startDate;
        if (!startStr) return true;
        const fileDate = new Date(item['Date Filed']); fileDate.setHours(0,0,0,0);
        const startDate = new Date(startStr); startDate.setHours(0,0,0,0);
        return fileDate >= startDate;
    }

    // Show/hide + persistently highlight rows matching the query. Returns match count. No scroll.
    function _highlightDetailsMatches(q) {
        let matchCount = 0;
        document.querySelectorAll('#details-modal-body tbody tr').forEach(row => {
            const caseId = (row.cells[0] ? row.cells[0].textContent.trim() : '').toLowerCase();
            const show = !q || caseId.includes(q);
            row.style.display = show ? '' : 'none';
            if (show && q) { matchCount++; row.style.background = 'rgba(250, 204, 21, 0.35)'; }
            else { row.style.background = ''; }
        });
        return matchCount;
    }

    // Run after a details render — re-applies the active search highlight (persistent) and scrolls to it once
    function _applyDetailsHighlight() {
        const search = document.getElementById('details-case-search');
        const q = ((search && search.value.trim()) || _pendingHighlightCaseId || '').toLowerCase();
        _pendingHighlightCaseId = null;
        if (!q) return;
        setTimeout(() => {
            _highlightDetailsMatches(q);
            const first = document.querySelector('#details-modal-body tbody tr[style*="background"]');

    function _loadDetailsContent(clientName) {
        document.getElementById('details-modal-title').textContent = clientName;

        // Cache hit — instant render
        if (_detailsCache.has(clientName)) {
            _renderDetailsData(clientName, _detailsCache.get(clientName));
            return;
        }

        // Cache miss — spinner + fetch
        document.getElementById('details-modal-body').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:120px;"><div class="loading-spinner"></div></div>';
        google.script.run
            .withSuccessHandler(d => {
                _detailsCache.set(clientName, d);
                _renderDetailsData(clientName, d);
            })
            .withFailureHandler(onFailure)
            .getClientDetails(clientName);
    }

    function _prefetchDetailsClients(skipName) {
        if (!billingSummaryData) return;
        const queue = getFilteredBillingClients()
            .map(s => s.clientName)
            .filter(name => name !== skipName && !_detailsCache.has(name));
        // Throttle: fetch in batches of 3 so we don't saturate the GAS thread pool
        const BATCH = 3;
        const runBatch = () => {
            const slice = queue.splice(0, BATCH);
            if (slice.length === 0) return;
            let done = 0;
            slice.forEach(name => {
                google.script.run
                    .withSuccessHandler(d => {
                        _detailsCache.set(name, d);
                        if (++done === slice.length) runBatch();
                    })
                    .withFailureHandler(() => { if (++done === slice.length) runBatch(); })
                    .getClientDetails(name);
            });
        };
        runBatch();
    }

        let hint = document.getElementById('details-search-hint');

            hint.remove();
        }
    }

    function handleDownload(type, invoiceNumber, clientName) {
        // PDF: if a true archived hard copy exists on Drive, open that instead of regenerating
        if (type === 'pdf') {
            const h = historyData.find(x => x.invoiceNumber === invoiceNumber);
            if (h && h.pdfUrl) { window.open(h.pdfUrl, '_blank'); return; }
        }
        const doDownload = (d) => {
            const histItem = historyData.find(h => h.invoiceNumber === invoiceNumber);
            if (!histItem) { setLoading(false); return showToast('Invoice not found', 'error'); }
            let cases;
            // Prefer the frozen snapshot — true hard copy, immune to later sheet changes
            if (histItem.caseSnapshot && histItem.caseSnapshot.length > 0) {
                cases = histItem.caseSnapshot;
            } else {
                // Legacy invoices (pre-snapshot): rebuild from current sheet data
                const caseSet = new Set(histItem.caseIds.map(String));
                cases = (d.cases || []).filter(c => caseSet.has(String(c['Case ID'])));
            }
            if (cases.length === 0 && histItem.totalReimbursed > 0) {
                cases = [{ 'Case ID': 'Builder-Manual', 'Claim Type': 'Manual Recovery / Adjustment', 'RMS Posting Date': histItem.billedDate, 'Reimbursement Amount (total)': histItem.totalReimbursed }];
            }
            if (type === 'pdf') {
                const blob = generatePDFBlob(clientName, cases, { invoiceNumber, billedDate: new Date(histItem.billedDate) });
                if (blob) window.open(URL.createObjectURL(blob));
                else showToast('Failed to generate PDF', 'error');
            } else {
                const link = document.createElement('a');
                link.href = 'data:text/csv;charset=utf-8,' + encodeURI(generateCSVContent(clientName, cases, { invoiceNumber }));
                link.download = `Invoice_${invoiceNumber}.csv`;
                link.click();
            }
            setLoading(false);
        };
        setLoading(true);
        // Snapshot invoices need no live data at all — render straight from the frozen copy
        const hist = historyData.find(h => h.invoiceNumber === invoiceNumber);
        if (hist && hist.caseSnapshot && hist.caseSnapshot.length > 0) { doDownload({ cases: [] }); return; }
        // Use cache if available — no server call needed
        if (_detailsCache.has(clientName)) { doDownload(_detailsCache.get(clientName)); return; }
        google.script.run.withSuccessHandler(d => {
            _detailsCache.set(clientName, d);
            doDownload(d);
        }).getClientDetails(clientName);
    }

    function _buildInvoiceModal(clientName, invNum, d) {
        const billedIds = new Set(d.billedIds.map(String));
        billedIds.add('13011996');
        const unbilled = d.cases.filter(c => isCaseBillable(c) && _isBillablePosting(c) && !_isRowBilled(c['Case ID'], c['RMS Posting Date']) && c['Reimbursement Status'] === 'Approved');
        if (unbilled.length === 0) return showToast('No billable cases', 'error');
        const total = unbilled.reduce((s, c) => s + parseCurrency(c['Reimbursement Amount (total)']), 0);
        const rate = getClientRate(clientName);
        showInvoiceGeneratedModal({ clientName, invoiceNumber: invNum, cases: unbilled, caseIds: unbilled.map(c => c['Case ID']), totalFee: total * rate, totalReimbursed: total });
    }
