    // Convert a Blob to raw base64 (no data: prefix) for sending to the server
    function _blobToBase64(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(String(reader.result).split(',')[1] || '');
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    }

    // --- FULL PDF GENERATION ---
    function generatePDFBlob(clientName, cases, invoiceDetails) {
        const doc = new jsPDF({ putOnlyUsedFonts: true, unit: 'pt' });
        const rate = getClientRate(clientName);
        const billableCases = cases.filter(c => parseCurrency(c['Reimbursement Amount (total)']) > 0);
        if (billableCases.length === 0) return null;

        const totalReimbursed = billableCases.reduce((sum, c) => sum + parseCurrency(c['Reimbursement Amount (total)']), 0);
        const totalFee = totalReimbursed * rate;

        const pageMargin = 40;
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();
        const brandColor = '#0071dc';
        const lightGray = '#f3f4f6';
        const darkGray = '#4b5563';
        const textGray = '#6b7280';
        const black = '#111827';
        
        const clientInfo = billingSummaryInfo[clientName.trim()] || {};
        let issueDate = new Date();
        if (invoiceDetails && invoiceDetails.billedDate) issueDate = new Date(invoiceDetails.billedDate);
        let dueDate = new Date(issueDate);
        dueDate.setDate(issueDate.getDate() + 7); 
        
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(12);
        doc.setTextColor(black);
        doc.text("Threecolts", pageMargin, 60);

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(textGray);
        doc.text("16192 Coastal Highway\nLewes, Delaware 19958\nUnited States\nsupport@threecolts.com", pageMargin, 75);

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(28);
        doc.setTextColor(black);
        doc.text('INVOICE', pageWidth - pageMargin, 60, { align: 'right' });

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(textGray);
        let detailsY = 85;
        const rightAlignX = pageWidth - pageMargin;
        
        const addDetail = (label, value) => {
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(darkGray);
            doc.text(label, rightAlignX - 120, detailsY);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(black);
            doc.text(value, rightAlignX, detailsY, { align: 'right' });
            detailsY += 18;
        };
        
        addDetail('Invoice #:', invoiceDetails.invoiceNumber);
        addDetail('Date:', issueDate.toLocaleDateString());
        addDetail('Due Date:', dueDate.toLocaleDateString());
        
        let startY = 170;
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(textGray);
        doc.text('BILL TO', pageMargin, startY);
        doc.setLineWidth(0.5);
        doc.setDrawColor('#E5E7EB');
        doc.line(pageMargin, startY + 5, pageWidth - pageMargin, startY + 5);

        startY += 20;
        doc.setFontSize(11);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(black);
        doc.text(clientName, pageMargin, startY);
        
        if (clientInfo.address) {
            startY += 15;
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.setTextColor(textGray);
            const addressLines = doc.splitTextToSize(clientInfo.address, 250);
            doc.text(addressLines, pageMargin, startY);
            startY += (addressLines.length * 12);
        }

        const tableData = billableCases.map(c => {
            const amount = parseCurrency(c['Reimbursement Amount (total)']);
            const fee = amount * rate;
            const postingDate = c['RMS Posting Date'] ? new Date(c['RMS Posting Date']).toLocaleDateString() : 'N/A';
            return [c['Case ID'], c['Claim Type'] || 'N/A', postingDate, formatCurrency(amount), formatPercent(rate), formatCurrency(fee)];
        });

        doc.autoTable({
            startY: startY + 30,
            head: [['Case ID', 'Description', 'Approval Date', 'Recovered', 'Fee Rate', 'Fee Amount']],
            body: tableData,
            theme: 'plain',
            headStyles: { fillColor: black, textColor: '#FFFFFF', fontStyle: 'bold', fontSize: 10 },
            styles: { fontSize: 9, cellPadding: 8, textColor: black, lineColor: '#FFFFFF', lineWidth: 0 },
            columnStyles: { 3: { halign: 'right' }, 4: { halign: 'right' }, 5: { halign: 'right' } },
            margin: { left: pageMargin, right: pageMargin }
        });

        let finalY = doc.lastAutoTable.finalY;
        if (finalY > pageHeight - 150) { doc.addPage(); finalY = pageMargin; }

        const summaryX = pageWidth - pageMargin - 200;
        const addSummaryLine = (label, value, isBold, addBox, fontSize = 10) => {
            if (addBox) { 
                finalY += 35; // Increment before drawing box
                doc.setFillColor(lightGray); 
                doc.rect(summaryX - 10, finalY - 22, 220, 32, 'F'); 
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(fontSize);
                doc.setTextColor(black);
                doc.text(label, summaryX, finalY - 3, { align: 'left' });
                doc.text(value, pageWidth - pageMargin, finalY - 3, { align: 'right' });
            } else {
                finalY += 20;
                doc.setFont('helvetica', isBold ? 'bold' : 'normal');
                doc.setFontSize(fontSize);
                doc.setTextColor(black);
                doc.text(label, summaryX, finalY);
                doc.text(value, pageWidth - pageMargin, finalY, { align: 'right' });
            }
        };
        
        finalY += 20;
        addSummaryLine('Total Recovered:', formatCurrency(totalReimbursed));
        addSummaryLine('Subtotal:', formatCurrency(totalFee));
        addSummaryLine('Amount Due (USD):', formatCurrency(totalFee), true, true, 14);

        return doc.output('blob');
    }

    // --- FULL CSV GENERATION ---
    function generateCSVContent(clientName, cases, invoiceDetails) {
        const rate = getClientRate(clientName);
        const headers = 'Invoice To,Country,Walmart Posting Date,Item Description,Claim Type,GTIN,SKU ID,Case ID,Unit Amount,Rate,Quantity,Total Reimbursement,Conversion Rate,Currency,Total Reimbursed USD,Fee Amount';

        const rows = cases.map(c => {
            const totalReimbursement = parseCurrency(c['Reimbursement Amount (total)']);
            const feeAmount = totalReimbursement * rate;
            const unitAmount = parseCurrency(c['Reimbursement Amount/Unit']) || totalReimbursement;
            const qty = c['Quantity Requested'] || 1;
            const postingDate = c['RMS Posting Date'] ? new Date(c['RMS Posting Date']).toLocaleDateString('en-US') : 'N/A';
            const itemDescription = `Reimbursement Recovery for Case ID ${c['Case ID']} for $${totalReimbursement.toFixed(2)}`;

            return [
                `"${clientName.trim()}"`,
                `"US"`,
                `"${postingDate}"`,
                `"${itemDescription}"`,
                `"${c['Claim Type'] || ''}"`,
                `"${c['GTIN'] || ''}"`,
                `"${c['SKU ID'] || ''}"`,
                `"${c['Case ID']}"`,
                `"$${unitAmount.toFixed(2)}"`,
                `"${(rate * 100)}%"`,
                `"${qty}"`,
                `"$${totalReimbursement.toFixed(2)}"`,
                `""`,
                `"USD"`,
                `"$${totalReimbursement.toFixed(2)}"`,
                `"$${feeAmount.toFixed(2)}"`
            ].join(',');
        });
        
        const invoiceHeader = invoiceDetails ? `"${invoiceDetails.invoiceNumber}"` : `"Reimbursements for ${clientName.trim()}"`;
        return [invoiceHeader, headers, ...rows].join('\n');
    }

    function showConfirmation(t, m, o) { 
        return new Promise(resolve => {
            const modal = document.getElementById('confirm-modal');
            document.getElementById('confirm-title').textContent = t;
            document.getElementById('confirm-body').textContent = m;
            const ok = document.getElementById('confirm-ok-btn');
            const cancel = document.getElementById('confirm-cancel-btn');
            const cleanup = () => { modal.classList.remove('show'); };
            
            const newOk = ok.cloneNode(true); ok.parentNode.replaceChild(newOk, ok);
            const newCancel = cancel.cloneNode(true); cancel.parentNode.replaceChild(newCancel, cancel);

            newOk.className = `btn ${o.okButtonType === 'danger' ? 'btn-danger' : 'btn-primary'}`;
            newOk.onclick = () => { cleanup(); resolve(true); };
            newCancel.onclick = () => { cleanup(); resolve(false); };
            modal.classList.add('show');
        });
    }
    // --- INVOICE BUILDER LOGIC ---
    let builderItems = [];

    window.handleEditInvoice = async function(clientName) {
        setLoading(true);
        const invNum = await new Promise(r => google.script.run.withSuccessHandler(r).peekNextInvoiceNumber());
        google.script.run.withSuccessHandler(d => {
            setLoading(false);
            const unbilled = d.cases.filter(c => isCaseBillable(c) && _isBillablePosting(c) && !new Set(d.billedIds.map(String)).has(String(c['Case ID'])) && c['Reimbursement Status'] === 'Approved');
            if (unbilled.length === 0) return showToast('No billable cases', 'error');
            
            const displayDate = new Date();
            const dueDate = new Date();
            dueDate.setDate(dueDate.getDate() + 7);
            
            initBuilder(clientName, unbilled, invNum, displayDate, dueDate);
        }).getClientDetails(clientName);
    };

    window.handleEditHistoryInvoice = function(invoiceNumber, clientName) {
        setLoading(true);
        google.script.run.withSuccessHandler(d => {
            setLoading(false);
            const histItem = historyData.find(h => h.invoiceNumber === invoiceNumber);
            if (!histItem) return showToast('Invoice not found in history', 'error');
            
            const caseSet = new Set(histItem.caseIds.map(String));
            let invoiceCases = (d.cases || []).filter(c => caseSet.has(String(c['Case ID'])));
            
            // Fallback for manual invoices
            if (invoiceCases.length === 0 && histItem.totalReimbursed > 0) {
                invoiceCases = [{
                    'Case ID': 'Builder-Manual',
                    'Claim Type': 'Manual Recovery / Adjustment',
                    'RMS Posting Date': histItem.billedDate,
                    'Reimbursement Amount (total)': histItem.totalReimbursed
                }];
            }
            
            const displayDate = new Date(histItem.billedDate || Date.now());
            const dueDate = new Date(displayDate);
            dueDate.setDate(dueDate.getDate() + 7);
            
            initBuilder(clientName, invoiceCases, invoiceNumber, displayDate, dueDate);
        }).getClientDetails(clientName);
    };

    window.initBuilder = function(clientName = '', cases = [], invoiceNumber = '', date = new Date(), dueDate = new Date()) {
        const dl = document.getElementById('client-datalist');
        if (dl && billingSummaryData) dl.innerHTML = billingSummaryData.map(s => `<option value="${s.clientName}"></option>`).join('');
        
        document.getElementById('builder-client-name').value = clientName;
        document.getElementById('builder-invoice-number').value = invoiceNumber || `INV-${Math.floor(1000 + Math.random() * 9000)}`;
        document.getElementById('builder-date').value = date.toISOString().split('T')[0];
        document.getElementById('builder-due-date').value = dueDate.toISOString().split('T')[0];

        builderItems = [];
        if (cases && cases.length > 0) {
            cases.forEach(c => {
                const recoveredAmt = c.recovered || parseCurrency(c['Reimbursement Amount (total)']) || 0;
                builderItems.push({
                    id: c.caseId || c['Case ID'] || '',
                    desc: c.description || c['Claim Type'] || 'Lost Inbound',
                    approvalDate: c.approvalDate || (c['RMS Posting Date'] ? new Date(c['RMS Posting Date']).toISOString().split('T')[0] : new Date().toISOString().split('T')[0]),
                    recovered: recoveredAmt,
                    rate: typeof c.feeRate !== 'undefined' ? c.feeRate : getClientRate(clientName)
                });
            });
        } else {
            builderAddRow();
        }
        
        renderBuilderItems();
        switchView('builder');
    };

    window.builderAddRow = function() {
        builderItems.push({ id: '', desc: 'Lost Inbound', approvalDate: new Date().toISOString().split('T')[0], recovered: 0, rate: 0.25 });
        renderBuilderItems();
    };

    window.renderBuilderItems = function() {
        const tbody = document.getElementById('builder-items-body');
        if (!tbody) return;
        tbody.innerHTML = '';
        
        let totalRecov = 0, totalFee = 0;

        builderItems.forEach((item, index) => {
            const feeAmt = item.recovered * item.rate;
            totalRecov += item.recovered;
            totalFee += feeAmt;
            
            const tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid var(--color-border)';
            
            // Format for date type
            const dateVal = item.approvalDate || new Date().toISOString().split('T')[0];

            tr.innerHTML = `
                <td style="padding: 6px;"><input type="text" class="control-input small" style="width: 100%; border:1px solid transparent; background:transparent;" value="${item.id}" onchange="updateBuilderItem(${index}, 'id', this.value)"></td>
                <td style="padding: 6px;"><input type="text" class="control-input small" style="width: 100%; border:1px solid transparent; background:transparent;" value="${item.desc}" onchange="updateBuilderItem(${index}, 'desc', this.value)"></td>
                <td style="padding: 6px;"><input type="date" class="control-input small" style="width: 100%; border:1px solid transparent; background:transparent;" value="${dateVal}" onchange="updateBuilderItem(${index}, 'approvalDate', this.value)"></td>
                <td style="padding: 6px;">
                    <div style="display:flex;align-items:center;">
                        <span style="color:var(--color-text-secondary); margin-right:4px; font-size:13px;">$</span>
                        <input type="number" step="0.01" class="control-input small" style="width: 100%; text-align: right; border:1px solid transparent; background:transparent;" value="${item.recovered.toFixed(2)}" onchange="updateBuilderItem(${index}, 'recovered', parseFloat(this.value) || 0)">
                    </div>
                </td>
                <td style="padding: 6px;">
                    <div style="display:flex;align-items:center;justify-content:flex-end;">
                        <input type="number" step="1" class="control-input small" style="width: 45px; text-align: right; border:1px solid transparent; background:transparent;" value="${(item.rate * 100).toFixed(0)}" onchange="updateBuilderItem(${index}, 'rate', (parseFloat(this.value) || 0) / 100)">
                        <span style="color:var(--color-text-secondary); margin-left:4px; font-size:13px;">%</span>
                    </div>
                </td>
                <td style="padding: 6px; text-align: right; font-size:13px; font-weight:500;">${formatCurrency(feeAmt)}</td>
                <td style="padding: 6px; text-align: center;">
                    <button class="btn btn-icon" style="color:var(--color-danger); width:32px; height:32px; padding:0; display:flex; align-items:center; justify-content:center; margin-left:auto;" onclick="removeBuilderRow(${index})">
                        <i class="icon" data-icon="trash" style="width:14px;height:14px;"></i>
                    </button>
                </td>
            `;

            const inputs = tr.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => { input.style.border = '1px solid var(--color-brand)'; input.style.background = 'var(--color-surface)'; });
                input.addEventListener('blur', () => { input.style.border = '1px solid transparent'; input.style.background = 'transparent'; });
            });

            tbody.appendChild(tr);
        });

        document.getElementById('builder-total-recovered').innerText = formatCurrency(totalRecov);
        document.getElementById('builder-subtotal').innerText = formatCurrency(totalFee);
        document.getElementById('builder-amount-due').innerText = formatCurrency(totalFee);
    };

    window.updateBuilderItem = function(index, field, value) {
        if (builderItems[index]) { builderItems[index][field] = value; renderBuilderItems(); }
    };

    window.removeBuilderRow = function(index) {
        builderItems.splice(index, 1);
        renderBuilderItems();
    };

    window.generateBuilderPDF = async function() {
        const clientName = document.getElementById('builder-client-name').value || 'Unknown Client';
        const invoiceNumber = document.getElementById('builder-invoice-number').value || 'Draft';
        const dateStr = document.getElementById('builder-date').value;
        const dueDateStr = document.getElementById('builder-due-date').value;

        if (builderItems.length === 0) {
            showToast('Please add at least one item', 'error');
            return;
        }

        const cases = builderItems.map(item => ({
            'Case ID': item.id || '-',
            'Claim Type': item.desc || '-',
            'RMS Posting Date': item.approvalDate,
            'Reimbursement Amount (total)': item.recovered,
            // Re-map internal structures to what `generatePDFBlob` expects
        }));

        const invoiceDetails = {
            invoiceNumber: invoiceNumber,
            billedDate: dateStr
        };

        try {
            // Overwrite the normal rate logic with what's manually specified per row if needed
            // But generatePDFBlob uses `getClientRate`, we have a workaround: generatePDFBlob itself calls getClientRate
            // To be highly accurate with unique rates we should ideally update generatePDFBlob. 
            // For now, generate the PDF blob natively using our helper:
            const blob = generatePDFBlob(clientName, cases, invoiceDetails);
            if(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); 
                a.href = url; 
                a.download = `Invoice_${invoiceNumber}.pdf`; 
                a.click();
                showToast('Invoice PDF Downloaded!', 'success');
            } else {
                showToast('Failed to generate PDF', 'error');
            }
        } catch (e) {
            showToast('Error creating PDF: ' + e.message, 'error');
        }
    };

    window.saveBuilderInvoice = function() {
        const clientName = document.getElementById('builder-client-name').value || 'Unknown Client';
        const invoiceNumber = document.getElementById('builder-invoice-number').value || 'Draft';
        const dateStr = document.getElementById('builder-date').value;

        if (builderItems.length === 0) {
            showToast('Please add at least one item', 'error');
            return;
        }

        let totalFee = 0;
        let totalReimbursed = 0;
        const caseIds = [];

        builderItems.forEach(item => {
            const feeAmt = item.recovered * item.rate;
            totalFee += feeAmt;
            totalReimbursed += item.recovered;
            if (item.id) caseIds.push(item.id);
        });

        if (caseIds.length === 0) {
            caseIds.push("Builder-Custom");
        }

        setLoading(true);
        google.script.run.withSuccessHandler((success) => {
            setLoading(false);
            if (success) {
                showToast('Invoice Saved Successfully!', 'success');
                refreshBillingAndHistory();
            } else {
                showToast('Failed to save invoice', 'error');
            }
        }).withFailureHandler((err) => {
            setLoading(false);
            showToast('Server error: ' + err.message, 'error');
        }).saveInvoiceFromBuilder(invoiceNumber, clientName, dateStr, caseIds, totalFee, totalReimbursed);
    };

    // Attach builder actions on init
    document.addEventListener('DOMContentLoaded', () => {
        const addRowBtn = document.getElementById('builder-add-row-btn');
        if(addRowBtn) addRowBtn.addEventListener('click', builderAddRow);
        
        const dlBtn = document.getElementById('builder-download-btn');
        if(dlBtn) dlBtn.addEventListener('click', generateBuilderPDF);

        const saveBtn = document.getElementById('builder-save-btn');
        if(saveBtn) saveBtn.addEventListener('click', saveBuilderInvoice);
    });

</script>
